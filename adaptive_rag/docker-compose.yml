version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./graph:/app/graph
      # DB persistence will be stored here or via volume
      - sqlite_data:/app/db_data
    environment:
      # Inject from root .env or using Docker Secrets locally you can just map .env
      - ENVIRONMENT=production
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  sqlite_data:
